services:
  - type: web
    name: smart-sleep-coach-prototype
    runtime: static
    # No build step needed — the app is plain HTML/CSS/JS in /public
    buildCommand: ""
    staticPublishPath: ./public
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA-style fallback so deep links resolve to the app
      - type: rewrite
        source: /*
        destination: /index.html
