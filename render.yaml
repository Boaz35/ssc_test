services:
  - type: web
    name: smart-sleep-coach-prototype
    runtime: static
    # No build step needed — the app is plain HTML/CSS/JS in /public
    buildCommand: ""
    staticPublishPath: ./public
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    # No SPA rewrite: this app runs entirely from index.html with no
    # client-side routes, and a /* -> /index.html rewrite would intercept
    # requests for app.js / screens.js / styles.css and break the page.
